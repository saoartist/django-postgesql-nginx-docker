# =============================================================================
# Nginx Configuration
# =============================================================================
# This config sets up Nginx as a reverse proxy for Django/Gunicorn
# and serves static files directly.
# =============================================================================

upstream django {
    # "web" is the service name in docker-compose.yml
    # Docker Compose DNS resolves this to the Django container
    server web:8000;
}

# HTTP → Redirect to HTTPS
server {
    listen 80;
    server_name test.thanapand.com;

    # Maximum upload size (adjust as needed)
    client_max_body_size 10M;

    # =========================================================================
    # Static files — served directly by Nginx (fast!)
    # =========================================================================
    location /static/ {
        alias /app/staticfiles/;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect ทุกอย่างไป HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # =========================================================================
    # All other requests — forwarded to Django/Gunicorn
    # =========================================================================
    # location / {
    #     proxy_pass http://django;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}

# HTTPS
server {
    listen 443 ssl;
    server_name test.thanapand.com;

    ssl_certificate /etc/letsencrypt/live/test.thanapand.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test.thanapand.com/privkey.pem;

    client_max_body_size 10M;

    location /static/ {
        alias /app/staticfiles/;
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
